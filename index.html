<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Delivery Max</title>
<style>
  :root{--bg:#f1f5f9;--card:#fff;--tx:#0f172a;--mut:#64748b;--acc:#f0a828;--acc2:#b3730a;
        --line:rgba(0,0,0,.10);--ok:#15803d;--err:#dc2626;--vio:#7c3aed}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--tx);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .hide{display:none!important}

  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .box{width:100%;max-width:360px}
  .brand{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--acc2);margin-bottom:8px;text-align:center}
  h1{font-size:24px;margin:0 0 4px;text-align:center}
  .sub{font-size:13px;color:var(--mut);margin:0 0 26px;text-align:center}
  label{display:block;margin-bottom:14px}
  label span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:6px}
  input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px;
       background:#fff;color:var(--tx);outline:none;font-family:inherit}
  textarea{resize:vertical}
  input:focus,select:focus,textarea:focus{border-color:var(--acc)}
  .btn{background:var(--acc);color:#1a1d21;border:none;border-radius:10px;padding:9px 14px;
       font-size:12px;font-weight:700;cursor:pointer}
  .btn.block{width:100%;padding:13px;font-size:15px;margin-top:8px}
  .btn.gris{background:#e2e8f0;color:#475569}
  .btn.verde{background:#15803d;color:#fff}
  .btn[disabled]{opacity:.4}
  #msg{font-size:13px;text-align:center;min-height:20px;margin-top:12px}

  header{background:var(--card);border-bottom:1px solid var(--line);padding:18px 20px 14px;
         display:flex;justify-content:space-between;align-items:flex-start}
  header h2{margin:0;font-size:19px}
  .who{font-size:12px;color:var(--mut);margin-top:2px}
  .iconbtn{background:none;border:none;color:var(--mut);font-size:13px;cursor:pointer;padding:6px}
  nav{display:flex;gap:6px;padding:14px 20px 8px;position:sticky;top:0;background:var(--bg);z-index:5;overflow-x:auto}
  .tab{flex:1;min-width:80px;padding:10px 6px;border-radius:12px;border:1px solid transparent;background:none;
       font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;white-space:nowrap}
  .tab.on{background:#fef3c7;color:var(--acc2);border-color:#fcd34d}
  main{padding:8px 20px 70px}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
  .count{font-size:12px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;
        margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .card.sel{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
  .card.apagado{opacity:.35}
  .flex{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .name{font-size:14px;font-weight:600}
  .meta{font-size:12px;color:var(--mut);margin-top:2px}
  .del{background:none;border:none;color:#cbd5e1;font-size:16px;cursor:pointer;padding:4px}
  .del:active{color:var(--err)}
  .tarifa{width:90px;background:none;border:none;text-align:right;font-size:14px;font-weight:700;
          color:var(--acc2);outline:none;padding:0}
  .tarifa:disabled{color:#94a3b8}
  .hint{font-size:11px;color:var(--mut);margin:0 0 12px}
  .pill{font-size:11px;font-weight:600;color:var(--acc2);background:none;border:none;padding:5px;cursor:pointer}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#e2e8f0;color:#475569;
       display:inline-block;white-space:nowrap}
  .tag.ok{background:#dcfce7;color:#15803d}
  .tag.urg{background:#fee2e2;color:#dc2626}
  .tag.prog{background:#fef3c7;color:#b3730a}
  .tag.nor{background:#dcfce7;color:#15803d}
  .tag.vio{background:#ede9fe;color:#7c3aed}
  .estado{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;margin-top:8px;
          padding-top:8px;border-top:1px solid rgba(0,0,0,.05)}
  .dot{width:7px;height:7px;border-radius:50%}
  .urg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
  .uo{padding:12px 4px;border-radius:12px;border:1px solid var(--line);background:#fff;
      text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:var(--mut)}
  .uo.on{border-color:currentColor}
  .barra{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
         padding:14px 20px;display:flex;justify-content:space-between;align-items:center;gap:10px;
         box-shadow:0 -2px 12px rgba(0,0,0,.08);z-index:20}
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;
         justify-content:center;z-index:50}
  .sheet{background:var(--card);width:100%;max-width:440px;border-radius:18px 18px 0 0;
         padding:20px 20px 28px;max-height:88vh;overflow:auto}
  .sheet h3{margin:0 0 16px;font-size:15px}
  .err{background:#fee2e2;border:1px solid #fecaca;color:#991b1b;font-size:12px;
       padding:10px 14px;border-radius:10px;margin:12px 20px 0}
  .empty{text-align:center;color:var(--mut);font-size:13px;padding:36px 0}
  .tique{background:#fff;color:#111;border:1px solid #ddd;border-radius:8px;padding:16px;
         font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.6}
  .tique .c{text-align:center}
  .tique .lin{border-top:1px dashed #999;margin:8px 0}
  .tique .firma{margin-top:34px;border-top:1px solid #333;text-align:center;padding-top:4px}
  .sug{background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:12px 16px;
       margin-bottom:8px;cursor:pointer}
  .aviso{position:fixed;left:50%;transform:translateX(-50%);bottom:84px;z-index:60;
         background:#0f172a;color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;
         font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.28);cursor:pointer;
         animation:sube .3s ease;display:flex;align-items:center;gap:8px}
  @keyframes sube{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}
  @keyframes pulso{0%,100%{opacity:1}50%{opacity:.35}}
  .pulsa{animation:pulso 1.1s infinite;color:#dc2626;font-weight:700}
  .prog{height:8px;background:#e2e8f0;border-radius:20px;overflow:hidden;margin-top:8px}
  .prog i{display:block;height:100%;background:var(--acc);transition:width .4s}

  header,nav,main,#error{max-width:640px;margin-left:auto;margin-right:auto}
  @media(min-width:700px){
    header{margin-top:16px;border:1px solid var(--line);border-radius:14px}
    nav{position:static}
    #modal{align-items:center}
    .sheet{border-radius:16px}
    .barra{max-width:640px;left:50%;transform:translateX(-50%);border-radius:14px 14px 0 0}
  }
  @media print{
    body *{visibility:hidden}
    #modal,#modal *{visibility:visible}
    #modal{position:absolute;inset:0;background:#fff}
    .sheet{max-height:none;box-shadow:none}
    .noprint{display:none!important}
  }
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="brand">Delivery Max</div>
    <h1>Ingresar</h1>
    <p class="sub">Ingresá con el usuario (o correo) y la clave que te dio la administración</p>
    <label><span>Usuario</span><input id="u" autocomplete="username" autocapitalize="none" placeholder="usuario o correo"></label>
    <label><span>Clave</span><input id="p" type="password" autocomplete="current-password" placeholder="••••••••"></label>
    <button class="btn block" onclick="entrar()">Entrar</button>
    <div id="msg"></div>
  </div>
</div>

<div id="panel" class="hide">
  <header>
    <div>
      <div class="brand" style="text-align:left" id="rotulo">Panel</div>
      <h2 id="titulo">Delivery Max</h2>
      <div class="who" id="who"></div>
    </div>
    <div style="white-space:nowrap">
      <button class="iconbtn" onclick="cargarTodo()">↻</button>
      <button class="iconbtn" onclick="salir()">Salir</button>
    </div>
  </header>
  <div id="error" class="err hide"></div>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="modal" class="hide"></div>
<div id="barra"></div>

<script>
const API_KEY="AIzaSyA93I_0zQAYn9KpcUq-VUYFI3uHTsAHDMk";
const DB="https://max-delivery1-default-rtdb.firebaseio.com";
const DOMINIO="@deliverymax.app";
const correoDe=u=>u.indexOf("@")>=0?u:u+DOMINIO;

let tk=null,refresh=null,uid=null,me=null;
let zonas={},comercios={},cadetes={},usuarios={},pedidos={},planillas={},rutas={},clientes={},liquidaciones={};
let tab="", seleccion=[], verPlanilla=null;
let timerAuto=null, firmaDatos="", hayNovedad=false;

function firma(){
  /* resumen liviano para detectar cambios */
  let f="";
  for(const k in pedidos){const p=pedidos[k];f+=k+p.estado+(p.cadeteId||"")+";"}
  for(const k in planillas){f+=k+(planillas[k].conciliada?1:0)+";"}
  return f;
}
async function refrescoSilencioso(){
  if(!tk||!me) return;
  /* si el usuario está escribiendo en un formulario o hay un modal abierto, no toco la pantalla */
  const modalAbierto=!document.getElementById("modal").classList.contains("hide");
  const escribiendo=["INPUT","TEXTAREA","SELECT"].indexOf((document.activeElement||{}).tagName)>=0;
  try{
    const r=await Promise.all([get("pedidos"),get("planillas"),get("cadetes")]);
    const nuevosPedidos=r[0]||{}, nuevasPlanillas=r[1]||{};
    const antes=firma();
    pedidos=nuevosPedidos; planillas=nuevasPlanillas; cadetes=r[2]||{};
    const ahora=firma();
    if(antes!==ahora){
      hayNovedad=true;
      if(modalAbierto||escribiendo||seleccion.length){ mostrarAviso(); }
      else { render(); mostrarAviso(); }
    }
  }catch(e){ /* sin conexión: se reintenta en el próximo ciclo */ }
}
function mostrarAviso(){
  const viejo=document.getElementById("aviso"); if(viejo) viejo.remove();
  let txt="Hay novedades";
  if(esCadete()){
    const n=pedidosDelCadete().filter(x=>x[1].estado==="despachado").length;
    txt=n?"Tenés "+n+" entrega"+(n!==1?"s":"")+" para hacer":"Tu ruta cambió";
  }else if(esComercio()){
    txt="Tus pedidos se actualizaron";
  }else{
    const n=Object.values(pedidos).filter(p=>p.estado==="pendiente").length;
    txt=n?n+" pedido"+(n!==1?"s":"")+" pendiente"+(n!==1?"s":""):"Pedidos actualizados";
  }
  const d=document.createElement("div");
  d.id="aviso"; d.className="aviso";
  d.innerHTML='<span style="font-size:15px">🔔</span>'+txt+' · <u>ver</u>';
  d.onclick=function(){ hayNovedad=false; d.remove(); cerrar(); seleccion=[]; render(); };
  document.body.appendChild(d);
  setTimeout(function(){ const a=document.getElementById("aviso"); if(a&&a===d) a.remove(); },12000);
}
function arrancarAuto(){
  if(timerAuto) clearInterval(timerAuto);
  timerAuto=setInterval(refrescoSilencioso,15000);
  document.addEventListener("visibilitychange",function(){
    if(document.visibilityState==="visible") refrescoSilencioso();
  });
}

/* ============ AUTH ============ */
async function login(u,c){
  const r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key="+API_KEY,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({email:correoDe(u),password:c,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw new Error(traducir(d.error&&d.error.message));
  tk=d.idToken; refresh=d.refreshToken; uid=d.localId;
}
async function crearCuenta(u,c){
  const r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+API_KEY,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({email:correoDe(u),password:c,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw new Error(traducir(d.error&&d.error.message));
  return d.localId;
}
async function renovar(){
  if(!refresh) return false;
  const r=await fetch("https://securetoken.googleapis.com/v1/token?key="+API_KEY,
    {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
     body:"grant_type=refresh_token&refresh_token="+refresh});
  if(!r.ok) return false;
  const d=await r.json(); tk=d.id_token; refresh=d.refresh_token; return true;
}
function traducir(c){
  const m={EMAIL_NOT_FOUND:"Usuario inexistente",INVALID_PASSWORD:"Clave incorrecta",
   INVALID_LOGIN_CREDENTIALS:"Usuario o clave incorrectos",EMAIL_EXISTS:"Ese usuario ya existe",
   INVALID_EMAIL:"Usuario inválido",WEAK_PASSWORD:"La clave debe tener al menos 6 caracteres",
   TOO_MANY_ATTEMPTS_TRY_LATER:"Demasiados intentos. Probá en unos minutos."};
  return m[c]||c||"Error de conexión";
}
async function api(p,method,body){
  method=method||"GET";
  const o={method:method}; if(body!==undefined)o.body=JSON.stringify(body);
  let r=await fetch(DB+"/"+p+".json?auth="+tk,o);
  if(r.status===401){ if(await renovar()) r=await fetch(DB+"/"+p+".json?auth="+tk,o); }
  if(!r.ok) throw new Error(r.status===401||r.status===403?"No tenés permiso para esta acción":"Error de conexión");
  return r.json();
}
const get=p=>api(p), put=(p,d)=>api(p,"PUT",d), patch=(p,d)=>api(p,"PATCH",d), quitar=p=>api(p,"DELETE");

/* ============ SESIÓN ============ */
const ROLES={admin:"Administrador",supervisor:"Supervisor",operador:"Operador base",
             comercio:"Comercio",cadete:"Cadete"};
const etiqueta=r=>ROLES[r]||r;
const esAdmin=()=>me&&me.rol==="admin";
const esSup=()=>esAdmin()||(me&&me.rol==="supervisor");
const esStaff=()=>esSup()||(me&&me.rol==="operador");
const esComercio=()=>me&&me.rol==="comercio";
const esCadete=()=>me&&me.rol==="cadete";

async function entrar(){
  const u=document.getElementById("u").value.trim().toLowerCase();
  const c=document.getElementById("p").value;
  const msg=document.getElementById("msg");
  if(!u||!c){msg.style.color="#dc2626";msg.textContent="Completá usuario y clave";return}
  msg.style.color="#64748b"; msg.textContent="Verificando...";
  try{
    await login(u,c);
    me=await get("usuarios/"+uid);
    if(!me||!me.rol) throw new Error("Tu cuenta no tiene rol asignado. Avisale al Administrador.");
    document.getElementById("login").classList.add("hide");
    document.getElementById("panel").classList.remove("hide");
    document.getElementById("who").textContent=(me.nombre||u)+" · "+etiqueta(me.rol);
    document.getElementById("rotulo").textContent=
      esComercio()?"Panel Comercio":esCadete()?"Panel Cadete":"Panel Max";
    document.getElementById("titulo").textContent=esComercio()||esCadete()?(me.nombre||"Delivery Max"):"Delivery Max";
    document.getElementById("p").value=""; msg.textContent="";
    tab = esComercio()?"nuevo" : esCadete()?"ruta" : "pedidos";
    await cargarTodo();
    arrancarAuto();
  }catch(e){ msg.style.color="#dc2626"; msg.textContent=e.message; }
}
function salir(){
  if(timerAuto){clearInterval(timerAuto);timerAuto=null}
  const a=document.getElementById("aviso"); if(a)a.remove();
  tk=refresh=uid=me=null; seleccion=[];
  document.getElementById("barra").innerHTML="";
  document.getElementById("panel").classList.add("hide");
  document.getElementById("login").classList.remove("hide");
}

/* ============ DATOS ============ */
function mostrarError(m){
  const e=document.getElementById("error");
  if(!m){e.classList.add("hide");return}
  e.textContent=m; e.classList.remove("hide");
}
async function traer(p,reintentos){
  reintentos=reintentos||2;
  for(let i=0;i<=reintentos;i++){
    try{ return await get(p); }
    catch(e){ if(i===reintentos) throw e; await new Promise(r=>setTimeout(r,600)); }
  }
}
async function cargarTodo(){
  mostrarError("");
  try{
    const t=[traer("zonas"),traer("comercios"),traer("cadetes"),traer("pedidos"),
             traer("planillas"),traer("rutas"),traer("clientes"),traer("liquidaciones")];
    if(esSup()) t.push(traer("usuarios"));
    const r=await Promise.all(t);
    zonas=r[0]||{};comercios=r[1]||{};cadetes=r[2]||{};pedidos=r[3]||{};
    planillas=r[4]||{};rutas=r[5]||{};clientes=r[6]||{};liquidaciones=r[7]||{};usuarios=r[8]||{};
    render();
  }catch(e){ mostrarError("No se pudieron cargar los datos. Tocá ↻ para reintentar."); }
}
const esc=s=>String(s==null?"":s).replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c]));
const hora=()=>new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
const fecha=()=>new Date().toLocaleString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
const nomZonas=()=>Object.values(zonas).map(z=>z.nombre);
const tarifaDe=n=>{const z=Object.values(zonas).find(x=>x.nombre===n);return z?z.tarifa:0};

const URG={urgente:["Urgente","urg"],programado:["Programado","prog"],normal:["Normal","nor"]};
const EST={pendiente:["Pendiente de despacho","#b3730a"],asignado:["Cadete asignado","#2563eb"],
           despachado:["Despachado — en camino","#7c3aed"],entregado:["Entregado","#15803d"],
           devuelto:["NO ENTREGADO — decide el comercio","#dc2626"],
           cerrado:["Cerrado sin entregar","#64748b"]};
const MOTIVOS=["Domicilio cerrado / nadie atiende","Dirección incorrecta",
               "El cliente rechazó el pedido","El cliente no tenía el dinero","Otro motivo"];
const montoDe=p=>Number(p.tarifaEnvio||0)+Number(p.recargo||0);
const pagoCadeteDeZona=n=>{const z=Object.values(zonas).find(x=>x.nombre===n);
  return z&&z.pagoCadete!=null?Number(z.pagoCadete):Math.round(tarifaDe(n)*0.6)};
const pagoDe=p=>{const base=p.pagoCadete!=null?Number(p.pagoCadete):pagoCadeteDeZona(p.zona);
  return base+Math.round(Number(p.recargo||0)*0.6)};
function tagCobro(p){
  if(!p.cobrar) return '<span class="tag ok">sin cobro</span>';
  return '<span class="tag urg">COBRAR $'+(p.montoCobrar||0)+
    (p.envioIncluido?' (envío incl.)':' + envío $'+(p.tarifaEnvio||0))+'</span>';
}
function tagUrg(u){const x=URG[u]||URG.normal;return '<span class="tag '+x[1]+'">'+x[0]+'</span>'}
function lineaEstado(p){
  const e=EST[p.estado]||EST.pendiente;
  let extra="";
  if(p.cadeteNombre) extra=' · <span style="color:#64748b">'+esc(p.cadeteNombre)+'</span>';
  if(p.motivoNoEntrega&&(p.estado==="devuelto"||p.estado==="cerrado"))
    extra+='<br><span style="color:#64748b;font-weight:400">Motivo: '+esc(p.motivoNoEntrega)+'</span>';
  if(p.reintentos) extra+=' <span class="tag prog">reintento +50%</span>';
  return '<div class="estado" style="color:'+e[1]+'"><span class="dot" style="background:'+e[1]+'"></span>'+e[0]+extra+'</div>';
}
/* pedidos del comercio que está logueado */
function misPedidos(){
  return Object.entries(pedidos).filter(x=>x[1].comercioId===me.refId)
    .sort((a,b)=>(b[1].creado||0)-(a[1].creado||0));
}
function pedidosDelCadete(){
  return Object.entries(pedidos).filter(x=>x[1].cadeteId===me.refId&&x[1].estado!=="entregado")
    .sort((a,b)=>(a[1].creado||0)-(b[1].creado||0));
}

/* ============ RENDER ============ */
function render(){
  let tabs;
  if(esComercio()) tabs=[["nuevo","Cargar pedido"],["mios","Mis pedidos"],["planillas","Planillas"]];
  else if(esCadete()) tabs=[["ruta","Mi ruta"],["cobros","Cobros"],["hechas","Entregadas"]];
  else{ tabs=[["pedidos","Pedidos"],["liq","Liquidación"],["datos","Base de datos"],
              ["comercios","Comercios"],["zonas","Zonas"],["cadetes","Cadetes"]];
        if(esSup()) tabs.push(["usuarios","Accesos"]); }
  document.getElementById("nav").innerHTML=tabs.map(t=>
    '<button class="tab '+(tab===t[0]?"on":"")+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join("");
  const m=document.getElementById("main");
  const vistas={pedidos:vPedidosMax,comercios:vComercios,zonas:vZonas,cadetes:vCadetes,usuarios:vUsuarios,
                nuevo:vNuevoPedido,mios:vMisPedidos,planillas:vPlanillas,ruta:vRuta,hechas:vHechas,
                cobros:vCobros,liq:vLiquidacion,datos:vDatos};
  m.innerHTML=(vistas[tab]||vPedidosMax)();
  pintarBarra();
}
function setTab(t){ tab=t; seleccion=[]; render(); }

/* ---------- PANEL MAX: PEDIDOS ---------- */
let filtroZona="Todas";
function vPedidosMax(){
  const todos=Object.entries(pedidos).sort((a,b)=>(b[1].creado||0)-(a[1].creado||0));
  const pend=todos.filter(x=>x[1].estado==="pendiente");
  const grupos={};
  pend.forEach(x=>{ (grupos[x[1].zona]=grupos[x[1].zona]||[]).push(x) });
  const sug=Object.entries(grupos).filter(g=>g[1].length>=2);

  const enCurso=todos.filter(x=>x[1].estado==="despachado"||x[1].estado==="asignado").length;
  let h='<div class="row"><span class="count">'+
        (pend.length?'<span class="pulsa">'+pend.length+' pendientes</span>':'0 pendientes')+
        ' · '+enCurso+' en curso</span>'+
        '<button class="btn gris" onclick="abrir(\'pedidoMax\')">+ Pedido</button></div>';

  if(sug.length&&!seleccion.length){
    h+='<p class="hint">Rutas sugeridas — pedidos de la misma zona que conviene juntar:</p>';
    sug.forEach(g=>{
      const coms=new Set(g[1].map(x=>x[1].comercioNombre)).size;
      h+='<div class="sug" onclick="elegirGrupo(\''+esc(g[0])+'\')">'+
         '<div class="name">'+esc(g[0])+'</div><div class="meta">'+g[1].length+
         ' pedidos de '+coms+' comercio'+(coms!==1?"s":"")+' → 1 solo viaje</div></div>';
    });
  }
  const zs=["Todas"].concat(nomZonas());
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px">'+zs.map(z=>
      '<button class="tab '+(filtroZona===z?"on":"")+'" style="flex:none;padding:6px 12px" '+
      'onclick="setFiltro(\''+esc(z)+'\')">'+esc(z)+'</button>').join("")+'</div>';

  const lista=todos.filter(x=>filtroZona==="Todas"||x[1].zona===filtroZona);
  if(!lista.length) return h+'<div class="empty">No hay pedidos.</div>';

  const zonaSel=seleccion.length?pedidos[seleccion[0]].zona:null;
  h+=lista.map(function(x){
    const id=x[0],p=x[1],sel=seleccion.indexOf(id)>=0;
    const bloq=zonaSel&&p.zona!==zonaSel&&p.estado==="pendiente"&&!sel;
    return '<div class="card '+(sel?"sel ":"")+(bloq?"apagado":"")+'" onclick="tocarPedido(\''+id+'\')">'+
      '<div class="flex"><div>'+
        '<div class="meta" style="margin:0 0 3px">'+esc(p.comercioNombre)+'</div>'+
        '<div class="name">'+esc(p.destinatario)+'</div>'+
        '<div class="meta">'+esc(p.direccion)+' · <b>'+esc(p.zona)+'</b></div>'+
        (p.telefono?'<div class="meta">Tel: '+esc(p.telefono)+'</div>':'')+
        (p.detalle?'<div class="meta">'+esc(p.detalle)+'</div>':'')+
        '<div style="margin-top:6px">'+tagCobro(p)+'</div>'+
      '</div><div style="text-align:right">'+tagUrg(p.urgencia)+
        '<div class="meta">'+esc(p.hora||"")+'</div></div></div>'+
      lineaEstado(p)+'</div>';
  }).join("");
  return h;
}

function tocarPedido(id){
  const p=pedidos[id];
  if(p.estado!=="pendiente"){ abrirDetalle(id); return; }

    if(seleccion.length&&pedidos[seleccion[0]].zona!==p.zona) return;
    seleccion.push(id);

function buscarCliente(campo){
  const v=(campo==="nombre"?val("n1"):val("n5")).toLowerCase();
  if(v.length<3) return;
  const c=Object.values(clientes).find(x=>
    campo==="nombre" ? (x.nombre||"").toLowerCase()===v
                     : (x.telefono||"").replace(/\s/g,"")===v.replace(/\s/g,""));
  if(!c) return;
  if(campo==="telefono"&&!val("n1")) document.getElementById("n1").value=c.nombre||"";
  if(campo==="nombre"&&!val("n5")) document.getElementById("n5").value=c.telefono||"";
  if(!val("n2")&&c.direccion) document.getElementById("n2").value=c.direccion;
  if(c.zona){ const sel=document.getElementById("n3");
    for(const o of sel.options) if(o.value===c.zona) sel.value=c.zona; verTarifa(); }
}

function uo(id,t,d,col){
  const on=urgSel===id;
  return '<div class="uo '+(on?"on":"")+'" id="uo_'+id+'" style="'+(on?"color:"+col+";background:"+col+"14":"")+'" '+
    'onclick="setUrg(\''+id+'\')"><div>'+t+'</div>'+
    '<div style="font-size:9px;font-weight:400;opacity:.8;margin-top:2px">'+d+'</div></div>';
}
function setUrg(id){
  urgSel=id;
  for(const k in COLURG){
    const el=document.getElementById("uo_"+k);
    if(!el) continue;
    if(k===id){ el.classList.add("on"); el.style.color=COLURG[k]; el.style.background=COLURG[k]+"14"; }
    else{ el.classList.remove("on"); el.style.color=""; el.style.background=""; }

async function guardarPedido(){
  const cobra=document.getElementById("n6").checked;
  const d={destinatario:val("n1"),telefono:val("n5"),direccion:val("n2"),zona:val("n3"),
    urgencia:urgSel,detalle:val("n4"),estado:"pendiente",comercioId:me.refId,
    comercioNombre:(comercios[me.refId]&&comercios[me.refId].nombre)||me.nombre,
    cobrar:cobra, montoCobrar:cobra?Number(val("n7")||0):0,
    envioIncluido:cobra?document.getElementById("n8").checked:true,
    tarifaEnvio:tarifaDe(val("n3")), pagoCadete:pagoCadeteDeZona(val("n3")),
    creado:Date.now(),hora:hora()};
  if(!d.destinatario||!d.direccion) return alert("Completá cliente y dirección");
  if(cobra&&!d.montoCobrar) return alert("Indicá el monto a cobrar");
  const id="p"+Date.now();

  if(!clave) return;
  const cid="cl"+clave;
  const c={nombre:d.destinatario,telefono:d.telefono||"",direccion:d.direccion,zona:d.zona,
    ultimo:Date.now(), comercioId:d.comercioId};
  try{ await put("clientes/"+cid,c); clientes[cid]=c; }catch(e){}
}

async function cerrarDevuelto(id){
  const d={estado:"cerrado",finalizadoEn:Date.now()};
  try{ await patch("pedidos/"+id,d); Object.assign(pedidos[id],d); cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
async function reprogramar(id){
  const p=pedidos[id];
  const rec=Number(p.recargo||0)+Math.round(Number(p.tarifaEnvio||0)*0.5);
  const d={estado:"despachado",recargo:rec,reintentos:Number(p.reintentos||0)+1,motivoNoEntrega:null};
  try{ await patch("pedidos/"+id,d); Object.assign(pedidos[id],d); cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
function tocarMio(id){
  const p=pedidos[id];
  if(modo!=="despacho"&&p.estado==="devuelto"){ abrirDevuelto(id); return; }
  if(modo==="despacho"){
    if(p.estado!=="pendiente"&&p.estado!=="asignado") return;
    const i=seleccion.indexOf(id);
    if(i>=0) seleccion.splice(i,1);
    else{ if(seleccion.length&&pedidos[seleccion[0]].zona!==p.zona) return; seleccion.push(id); }
    render(); return;
  }
  if(p.estado==="pendiente") abrirEditar(id);
  else abrirDetalle(id);
}

  const zonas1=new Set(list.map(x=>x[1].zona));

    return '<div class="card"><div class="flex"><div>'+

  }).join("");
  h+='<p class="hint" style="margin-top:16px">Al terminar, volvé a cada comercio a rendir con el tique firmado.</p>';
  return h;
}

    '<div class="flex" style="margin-top:6px"><span class="meta">Envíos entregados hoy</span><b>$'+enviosHechos+'</b></div></div>'+
   '<div class="card" style="background:#fffbeb;border-color:#fcd34d">'+
    '<div class="flex"><span class="meta">Falta cobrar (pendientes)</span><b style="font-size:18px">$'+porCobrar+'</b></div>'+
    '<div class="flex" style="margin-top:6px"><span class="meta">Entregas pendientes</span><b>'+pendientes.length+'</b></div></div>';

        '<div class="name">'+esc(x[1].destinatario)+'</div>'+
        '<div class="meta">'+esc(x[1].comercioNombre)+' · '+esc(x[1].zona)+'</div></div>'+
        '<b>$'+(x[1].montoCobrar||0)+'</b></div></div>').join("")

}
function confirmarEntrega(id){

async function guardarNoEntrega(id,motivo){
  if(!motivo) return alert("Escribí el motivo");
  const d={estado:"devuelto",motivoNoEntrega:motivo,noEntregadoEn:Date.now(),horaNoEntrega:hora()};
  try{ await patch("pedidos/"+id,d); Object.assign(pedidos[id],d); cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
async function marcarEntregado(id){
  if(pedidos[id].estado!=="despachado"){
    cerrar(); mostrarError("No podés marcar la entrega: el comercio todavía no generó el despacho de este pedido.");
    return;
  }
  const d={estado:"entregado",horaEntrega:hora(),entregadoEn:Date.now(),finalizadoEn:Date.now()};
  try{ await patch("pedidos/"+id,d); Object.assign(pedidos[id],d); cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}

/* ---------- LIQUIDACIÓN ---------- */
let liqTipo="comercios", liqDesde="", liqHasta="";
function rango(){
  const d=liqDesde?new Date(liqDesde+"T00:00:00").getTime():0;
  const h=liqHasta?new Date(liqHasta+"T23:59:59").getTime():Date.now()+864e5;
  return [d,h];
}
function entregadosEnRango(tipo){
  /* tipo: "comercio" (default) o "cadete" — cada circuito se liquida por separado */
  const cual=tipo||liqTipo==="cadetes"?"cadete":"comercio";
  const [d,h]=rango();
  return Object.entries(pedidos).filter(x=>{
    const p=x[1];
    if(cual==="cadete"? p.liqCadeteId : p.liqId) return false;   /* ya liquidado en ese circuito */
    if(p.estado!=="entregado"&&p.estado!=="cerrado") return false;
    const t=p.finalizadoEn||p.entregadoEn||p.creado||0;
    return t>=d&&t<=h;
  });
}
function vLiquidacion(){
  const list=entregadosEnRango();
  let h='<div style="display:flex;gap:6px;margin-bottom:12px">'+
    '<button class="tab '+(liqTipo==="comercios"?"on":"")+'" onclick="liqTipo=\'comercios\';render()">Comercios</button>'+
    '<button class="tab '+(liqTipo==="cadetes"?"on":"")+'" onclick="liqTipo=\'cadetes\';render()">Cadetes</button>'+
    '<button class="tab '+(liqTipo==="hist"?"on":"")+'" onclick="liqTipo=\'hist\';render()">Historial</button></div>';
  if(liqTipo==="hist") return h+vHistorialLiq();
  h+=
    '<div style="display:flex;gap:8px;margin-bottom:8px">'+
    '<button class="btn gris" style="flex:1" onclick="rangoRapido(7)">Últimos 7 días</button>'+
    '<button class="btn gris" style="flex:1" onclick="rangoRapido(30)">Últimos 30</button>'+
    '<button class="btn gris" style="flex:1" onclick="rangoRapido(0)">Todo</button></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<label style="flex:1;margin:0"><span>Desde</span><input type="date" value="'+liqDesde+'" onchange="liqDesde=this.value;render()"></label>'+
    '<label style="flex:1;margin:0"><span>Hasta</span><input type="date" value="'+liqHasta+'" onchange="liqHasta=this.value;render()"></label></div>'+
    '<p class="hint">'+list.length+' entregas en el período. '+
    (liqDesde||liqHasta?'':'Sin filtro = todo el historial.')+'</p>';

  if(liqTipo==="comercios"){
    const g={};
    list.forEach(x=>{const p=x[1];const k=p.comercioId||"?";
      g[k]=g[k]||{nombre:p.comercioNombre||"—",cant:0,envios:0,cobrado:0};
      g[k].cant++; g[k].envios+=montoDe(p);
      if(p.cobrar) g[k].cobrado+=Number(p.montoCobrar||0);});
    const arr=Object.values(g).sort((a,b)=>b.envios-a.envios);
    if(!arr.length) return h+'<div class="empty">Sin entregas en el período.</div>';
    const tot=arr.reduce((a,x)=>a+x.envios,0);
    h+='<div class="card" style="background:#fffbeb;border-color:#fcd34d"><div class="flex">'+
       '<span class="name">Total a facturar</span><b style="font-size:20px">$'+tot+'</b></div></div>';
    h+='<p class="hint">Tocá un comercio para ver el detalle e imprimir su liquidación.</p>';
    h+=Object.entries(g).sort((a,b)=>b[1].envios-a[1].envios).map(e=>
      '<div class="card" style="padding:14px 16px;cursor:pointer" onclick="detalleComercio(\''+e[0]+'\')">'+
      '<div class="flex"><div style="min-width:0">'+
      '<div class="name" style="font-size:15px">'+esc(e[1].nombre)+'</div>'+
      '<div class="meta" style="line-height:1.6">'+e[1].cant+' entrega'+(e[1].cant!==1?"s":"")+
      (e[1].cobrado?'<br>Cobró para el comercio: $'+e[1].cobrado:'')+'</div>'+
      '</div><div style="text-align:right;white-space:nowrap">'+
      '<b style="font-size:17px">$'+e[1].envios+'</b><div class="meta">ver detalle ›</div></div>'+
      '</div></div>').join("");
    h+='<button class="btn block gris" onclick="exportarLiq()">Descargar CSV de esta liquidación</button>';
    return h;
  }
  const g={};
  list.forEach(x=>{const p=x[1];const k=p.cadeteId||"?";
    g[k]=g[k]||{nombre:p.cadeteNombre||"—",cant:0,envios:0,cobrado:0,pago:0};
    g[k].cant++; g[k].envios+=montoDe(p); g[k].pago+=pagoDe(p);
    if(p.cobrar) g[k].cobrado+=Number(p.montoCobrar||0);});
  const arr=Object.values(g).sort((a,b)=>b.cant-a.cant);
  if(!arr.length) return h+'<div class="empty">Sin entregas en el período.</div>';
  h+='<p class="hint">Tocá un cadete para ver el detalle e imprimir su liquidación de pago.</p>';
  h+=Object.entries(g).sort((a,b)=>b[1].cant-a[1].cant).map(function(e){
    const pago=e[1].pago||0;
    return '<div class="card" style="padding:16px;cursor:pointer" onclick="detalleCadete(\''+e[0]+'\')">'+
    '<div class="flex" style="align-items:flex-start;margin-bottom:8px">'+
      '<div class="name" style="font-size:16px">'+esc(e[1].nombre)+'</div>'+
      '<b style="font-size:18px;color:#15803d;white-space:nowrap">$'+pago+'</b></div>'+
    '<div class="meta" style="line-height:1.8">'+e[1].cant+' entrega'+(e[1].cant!==1?"s":"")+
      '<br>Facturado a comercios: $'+e[1].envios+
      (e[1].cobrado?'<br>Dinero cobrado a clientes: $'+e[1].cobrado:'')+
      '<br><b>A pagar al cadete: $'+pago+'</b> · ver detalle ›</div></div>';}).join("");
  return h;
}

function periodoTexto(){
  if(!liqDesde&&!liqHasta) return "Historial completo";
  const f=t=>t?new Date(t+"T00:00:00").toLocaleDateString("es-AR"):"—";
  return "Del "+f(liqDesde)+" al "+f(liqHasta||new Date().toISOString().slice(0,10));
}
function detalleComercio(cid){

  const nom=list[0][1].comercioNombre||"—";

  const totalCobrado=list.reduce((a,x)=>a+(x[1].cobrar?Number(x[1].montoCobrar||0):0),0);
  /* agrupado por zona */
  const porZona={};
  list.forEach(x=>{const z=x[1].zona||"—";
    porZona[z]=porZona[z]||{cant:0,tot:0,tarifa:Number(x[1].tarifaEnvio||0)};
    porZona[z].cant++; porZona[z].tot+=montoDe(x[1]);});

    '<table style="width:100%;font-size:12px;margin-bottom:14px"><tr>'+
      '<td><b>Comercio:</b> '+esc(nom)+'</td><td style="text-align:right"><b>Liquidación:</b> '+nroLiq+'</td></tr>'+
      '<tr><td><b>Período:</b> '+periodoTexto()+'</td>'+
      '<td style="text-align:right"><b>Emitida:</b> '+new Date().toLocaleDateString("es-AR")+'</td></tr></table>'+

    '<div style="font-size:12px;font-weight:700;margin-bottom:6px">Resumen por zona</div>'+
    '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px">'+
      '<tr style="background:#f8fafc"><th style="text-align:left;padding:6px;border:1px solid #e2e8f0">Zona</th>'+
      '<th style="padding:6px;border:1px solid #e2e8f0">Entregas</th>'+
      '<th style="padding:6px;border:1px solid #e2e8f0">Tarifa</th>'+
      '<th style="text-align:right;padding:6px;border:1px solid #e2e8f0">Subtotal</th></tr>'+
      Object.entries(porZona).map(z=>'<tr><td style="padding:6px;border:1px solid #e2e8f0">'+esc(z[0])+'</td>'+
        '<td style="text-align:center;padding:6px;border:1px solid #e2e8f0">'+z[1].cant+'</td>'+
        '<td style="text-align:center;padding:6px;border:1px solid #e2e8f0">$'+z[1].tarifa+'</td>'+
        '<td style="text-align:right;padding:6px;border:1px solid #e2e8f0">$'+z[1].tot+'</td></tr>').join("")+
      '<tr style="background:#fffbeb;font-weight:800"><td colspan="3" style="padding:8px;border:1px solid #e2e8f0">TOTAL A ABONAR</td>'+
      '<td style="text-align:right;padding:8px;border:1px solid #e2e8f0;font-size:15px">$'+totalEnvios+'</td></tr></table>'+

    (totalCobrado?'<div style="font-size:11px;background:#f8fafc;border:1px solid #e2e8f0;padding:8px;border-radius:6px;margin-bottom:14px">'+
      'Dinero cobrado a clientes y rendido al comercio en el período: <b>$'+totalCobrado+'</b> (informativo, no se descuenta de esta liquidación)</div>':'')+

    '<div style="font-size:12px;font-weight:700;margin-bottom:6px">Detalle de entregas</div>'+
    '<table style="width:100%;border-collapse:collapse;font-size:11px">'+
      '<tr style="background:#f8fafc"><th style="text-align:left;padding:5px;border:1px solid #e2e8f0">Fecha</th>'+
      '<th style="text-align:left;padding:5px;border:1px solid #e2e8f0">Cliente</th>'+
      '<th style="text-align:left;padding:5px;border:1px solid #e2e8f0">Zona</th>'+
      '<th style="text-align:left;padding:5px;border:1px solid #e2e8f0">Cadete</th>'+
      '<th style="text-align:right;padding:5px;border:1px solid #e2e8f0">Envío</th></tr>'+
      list.sort((a,b)=>(a[1].entregadoEn||0)-(b[1].entregadoEn||0)).map(x=>{const p=x[1];
        return '<tr><td style="padding:5px;border:1px solid #e2e8f0">'+
          (p.entregadoEn?new Date(p.entregadoEn).toLocaleDateString("es-AR"):"")+'</td>'+

          '<td style="padding:5px;border:1px solid #e2e8f0">'+esc(p.zona)+'</td>'+
          '<td style="padding:5px;border:1px solid #e2e8f0">'+esc(p.cadeteNombre||"")+'</td>'+
          '<td style="text-align:right;padding:5px;border:1px solid #e2e8f0">$'+montoDe(p)+

    '</table>'+
    '<table style="width:100%;margin-top:40px;font-size:11px"><tr>'+

     '<button class="btn block noprint" onclick="cerrarLiquidacion(\''+cid+'\',\''+nroLiq+'\','+totalEnvios+')">'+

     '<p class="hint noprint">Al cerrarla, estas entregas quedan liquidadas y no vuelven a aparecer en otro período.</p>';

function rangoRapido(dias){
  const hoy=new Date();
  liqHasta=hoy.toISOString().slice(0,10);
  if(!dias){ liqDesde=""; liqHasta=""; }
  else{ const d=new Date(hoy.getTime()-dias*864e5); liqDesde=d.toISOString().slice(0,10); }
  render();
}
async function cerrarLiquidacion(cid,nro,total){
  const list=entregadosEnRango("comercio").filter(x=>x[1].comercioId===cid);
  if(!list.length) return;
  if(!confirm("¿Cerrar la liquidación "+nro+" por $"+total+"?\n\nEstas "+list.length+
              " entregas quedan liquidadas y no vuelven a aparecer."))return;
  const lid="liq"+Date.now();
  const doc={numero:nro,comercioId:cid,comercioNombre:list[0][1].comercioNombre||"",
    desde:liqDesde||"",hasta:liqHasta||"",periodo:periodoTexto(),cantidad:list.length,
    total:total,estado:"presentada",creada:Date.now(),fecha:fecha(),
    pedidoIds:list.map(x=>x[0]),emitidaPor:me.nombre||""};
  try{
    await put("liquidaciones/"+lid,doc); liquidaciones[lid]=doc;
    for(const x of list){ await patch("pedidos/"+x[0],{liqId:lid}); pedidos[x[0]].liqId=lid; }
    cerrar(); liqTipo="hist"; render();
  }catch(e){ cerrar(); mostrarError("No se pudo cerrar: "+e.message+". Revisá las reglas de Firebase."); }
}
function vHistorialLiq(){
  const list=Object.entries(liquidaciones).sort((a,b)=>(b[1].creada||0)-(a[1].creada||0));
  if(!list.length) return '<div class="empty">Todavía no cerraste ninguna liquidación.</div>';
  const pend=list.filter(x=>x[1].estado==="presentada").reduce((a,x)=>a+Number(x[1].total||0),0);
  let h='<div class="card" style="background:#fffbeb;border-color:#fcd34d"><div class="flex">'+
    '<span class="name">Pendiente de cobro</span><b style="font-size:20px">$'+pend+'</b></div></div>';
  return h+list.map(function(x){const id=x[0],l=x[1];
    const cob=l.estado==="cobrada";
    return '<div class="card" style="padding:16px">'+
      '<div class="flex" style="align-items:flex-start;margin-bottom:10px">'+
        '<div style="min-width:0"><div class="name" style="font-size:16px;line-height:1.4">'+
          esc(l.comercioNombre)+'</div>'+
          '<div class="meta" style="margin-top:4px">'+(l.tipo==="cadete"?"Pago a cadete":"Cobro a comercio")+'</div></div>'+

async function cerrarLiqCadete(cid,nro,total){
  const list=entregadosEnRango("cadete").filter(x=>x[1].cadeteId===cid);
  if(!list.length) return;
  if(!confirm("¿Registrar el pago "+nro+" por $"+total+" a este cadete?"))return;
  const lid="liq"+Date.now();
  const doc={numero:nro,tipo:"cadete",comercioId:cid,comercioNombre:list[0][1].cadeteNombre||"",
    desde:liqDesde||"",hasta:liqHasta||"",periodo:periodoTexto(),cantidad:list.length,
    total:total,estado:"presentada",creada:Date.now(),fecha:fecha(),
    pedidoIds:list.map(x=>x[0]),emitidaPor:me.nombre||""};
  try{
    await put("liquidaciones/"+lid,doc); liquidaciones[lid]=doc;
    for(const x of list){ await patch("pedidos/"+x[0],{liqCadeteId:lid}); pedidos[x[0]].liqCadeteId=lid; }
    cerrar(); liqTipo="hist"; render();
  }catch(e){ cerrar(); mostrarError("No se pudo cerrar: "+e.message); }
}
function exportarCadete(cid){
  const list=entregadosEnRango("cadete").filter(x=>x[1].cadeteId===cid);
  const f=[["Fecha","Comercio","Cliente","Zona","Pago cadete","Cobro","Monto cobrado"]];
  list.forEach(x=>{const p=x[1];
    f.push([p.finalizadoEn?new Date(p.finalizadoEn).toLocaleDateString("es-AR"):"",p.comercioNombre||"",
      p.destinatario||"",p.zona||"",pagoDe(p),p.cobrar?"SI":"NO",p.montoCobrar||0]);});
  f.push([]); f.push(["","","","TOTAL",list.reduce((a,x)=>a+pagoDe(x[1]),0),"",""]);
  bajarCSV("pago-cadete.csv",f);
}
function exportarComercio(cid){
  const list=entregadosEnRango("comercio").filter(x=>x[1].comercioId===cid);
  const f=[["Fecha","Cliente","Telefono","Direccion","Zona","Cadete","Envio","Cobro","Monto cobrado"]];
  list.forEach(x=>{const p=x[1];
    f.push([p.entregadoEn?new Date(p.entregadoEn).toLocaleDateString("es-AR"):"",p.destinatario||"",
      p.telefono||"",p.direccion||"",p.zona||"",p.cadeteNombre||"",montoDe(p),
      p.cobrar?"SI":"NO",p.montoCobrar||0]);});
  const tot=list.reduce((a,x)=>a+montoDe(x[1]),0);
  f.push([]); f.push(["","","","","","TOTAL",tot,"",""]);
  bajarCSV("liquidacion-"+(list[0]?list[0][1].comercioNombre:"comercio").replace(/\s/g,"-")+".csv",f);

function bajarCSV(nombre,filas){
  const csv=filas.map(f=>f.map(c=>{
    const t=String(c==null?"":c).replace(/"/g,'""');
    return /[";,\n]/.test(t)?'"'+t+'"':t;
  }).join(";")).join("\r\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=nombre; a.click();
}
function exportarPedidos(){
  const f=[["Fecha","Hora","Comercio","Cliente","Telefono","Direccion","Zona","Urgencia",
            "Detalle","Estado","Cadete","Cobrar","Monto","Envio incluido","Tarifa envio","Hora entrega"]];
  Object.values(pedidos).sort((a,b)=>(a.creado||0)-(b.creado||0)).forEach(p=>{
    f.push([p.creado?new Date(p.creado).toLocaleDateString("es-AR"):"",p.hora||"",p.comercioNombre||"",
      p.destinatario||"",p.telefono||"",p.direccion||"",p.zona||"",p.urgencia||"",p.detalle||"",
      p.estado||"",p.cadeteNombre||"",p.cobrar?"SI":"NO",p.montoCobrar||0,
      p.cobrar?(p.envioIncluido?"SI":"NO"):"",p.tarifaEnvio||0,p.horaEntrega||""]);
  });
  bajarCSV("delivery-max-pedidos.csv",f);
}
function exportarClientes(){

  Object.values(clientes).forEach(c=>f.push([c.nombre||"",c.telefono||"",c.direccion||"",c.zona||"",
    c.ultimo?new Date(c.ultimo).toLocaleDateString("es-AR"):""]));

function exportarLiq(){

  list.forEach(x=>{const p=x[1];

async function borrar(rama,id){
  if(!confirm("¿Borrar este registro?"))return;
  try{ await quitar(rama+"/"+id);

    if(rama==="zonas")delete zonas[id];
    if(rama==="cadetes")delete cadetes[id];
    if(rama==="usuarios")delete usuarios[id];
    render();

}

      '<p class="meta">'+items.length+' pedidos · '+esc(items[0].zona)+'</p>'+
      '<div style="margin:10px 0">'+items.map(p=>'<div class="meta">• '+esc(p.destinatario)+' — '+esc(p.direccion)+'</div>').join("")+'</div>'+
      '<label><span>Cadete que retira</span><input id="f1" value="'+esc(items[0].cadeteNombre||"")+'" placeholder="Nombre del cadete"></label>'+
      '<button class="btn block" onclick="gDespacho()">Generar tique</button>');
  }
  if(t==="pedidoMax"){
    const cs=Object.entries(comercios).map(c=>'<option value="'+c[0]+'">'+esc(c[1].nombre)+'</option>').join("");
    sheet('<h3>Cargar pedido (por el operador)</h3>'+
      '<p class="hint">Para pedidos que llegan por teléfono o WhatsApp.</p>'+
      '<label><span>Comercio</span><select id="f0">'+cs+'</select></label>'+
      '<label><span>Destinatario</span><input id="f1"></label>'+
      '<label><span>Dirección</span><input id="f2"></label>'+
      '<label><span>Zona</span><select id="f3">'+zs+'</select></label>'+
      '<label><span>Urgencia</span><select id="f4"><option value="normal">Normal</option>'+
      '<option value="programado">Programado</option><option value="urgente">Urgente</option></select></label>'+
      '<label><span>Detalle</span><textarea id="f5" rows="2"></textarea></label>'+
      '<button class="btn block" onclick="gPedidoMax()">Cargar pedido</button>');
  }
}
function abrirAcceso(tipo,id,nombre){
  sheet('<h3>Dar acceso a '+esc(nombre)+'</h3>'+
    '<p class="hint">Se crea la cuenta para que entre a su propio panel.</p>'+
    '<label><span>Usuario (sin espacios)</span><input id="f1" autocapitalize="none" placeholder="ej: farmacialuna"></label>'+
    '<label><span>Clave (mínimo 6)</span><input id="f2" type="text"></label>'+
    '<input type="hidden" id="ftipo" value="'+tipo+'"><input type="hidden" id="fid" value="'+id+'">'+
    '<input type="hidden" id="fnom" value="'+esc(nombre)+'">'+
    '<button class="btn block" onclick="gAcceso()">Crear acceso</button>');
}
async function gComercio(){
  const d={nombre:val("f1"),tipo:val("f2"),ubicacion:val("f3")};
  if(!d.nombre||!d.tipo)return alert("Completá nombre y tipo");
  const id="c"+Date.now();
  try{ await put("comercios/"+id,d); comercios[id]=d; cerrar(); render(); }catch(e){ cerrar(); mostrarError(e.message); }
}
async function gZona(){
  const d={nombre:val("f1"),tarifa:Number(val("f2")),activa:true};
  if(!d.nombre)return alert("Completá el nombre");
  const id="z"+Date.now();
  try{ await put("zonas/"+id,d); zonas[id]=d; cerrar(); render(); }catch(e){ cerrar(); mostrarError(e.message); }
}
async function gCadete(){
  const d={nombre:val("f1"),estado:"disponible"};
  if(!d.nombre)return alert("Completá el nombre");
  const id="cd"+Date.now();
  try{ await put("cadetes/"+id,d); cadetes[id]=d; cerrar(); render(); }catch(e){ cerrar(); mostrarError(e.message); }
}
async function gStaff(){
  const nom=val("f1"),rol=val("f2"),us=val("f3").toLowerCase().replace(/\s/g,""),cl=val("f4");
  if(!nom||!us||cl.length<6)return alert("Completá todo. La clave necesita 6 caracteres o más.");
  try{
    const nu=await crearCuenta(us,cl);
    const d={nombre:nom,rol:rol,usuario:us};
    await put("usuarios/"+nu,d); usuarios[nu]=d; cerrar(); render();
    alert("Acceso creado.\n\nUsuario: "+us+"\nClave: "+cl);
  }catch(e){ alert(e.message); }
}
async function gAcceso(){
  const tipo=val("ftipo"),id=val("fid"),nom=val("fnom");
  const us=val("f1").toLowerCase().replace(/\s/g,""),cl=val("f2");
  if(!us||cl.length<6)return alert("Completá usuario y clave (mínimo 6 caracteres)");
  try{
    const nu=await crearCuenta(us,cl);
    const d={nombre:nom,rol:tipo,usuario:us,refId:id};
    await put("usuarios/"+nu,d); usuarios[nu]=d; cerrar(); render();
    alert("Acceso creado para "+nom+".\n\nUsuario: "+us+"\nClave: "+cl);
  }catch(e){ alert(e.message); }
}
async function gPedidoMax(){
  const cid=val("f0");
  const d={comercioId:cid,comercioNombre:(comercios[cid]&&comercios[cid].nombre)||"",
    destinatario:val("f1"),direccion:val("f2"),zona:val("f3"),urgencia:val("f4"),
    detalle:val("f5"),estado:"pendiente",tarifaEnvio:tarifaDe(val("f3")),
    pagoCadete:pagoCadeteDeZona(val("f3")),creado:Date.now(),hora:hora()};
  if(!d.destinatario||!d.direccion)return alert("Completá destinatario y dirección");
  const id="p"+Date.now();
  try{ await put("pedidos/"+id,d); pedidos[id]=d; cerrar(); render(); }catch(e){ cerrar(); mostrarError(e.message); }
}
async function asignar(cid,nom){
  try{
    const rid="r"+Date.now();
    await put("rutas/"+rid,{zona:pedidos[seleccion[0]].zona,cadeteId:cid,cadeteNombre:nom,
      pedidoIds:seleccion.slice(),creada:Date.now(),fecha:fecha()});
    for(const id of seleccion){
      const d={estado:"asignado",cadeteId:cid,cadeteNombre:nom,rutaId:rid};
      await patch("pedidos/"+id,d); Object.assign(pedidos[id],d);
    }
    seleccion=[]; cerrar(); render();
  }catch(e){ cerrar(); mostrarError(e.message); }
}
async function gDespacho(){
  const cadete=val("f1");
  if(!cadete)return alert("Escribí el nombre del cadete que retira");
  const nro="D-"+String(Object.keys(planillas).length+1).padStart(4,"0");
  const plid="pl"+Date.now();
  const pl={numero:nro,comercioId:me.refId,comercioNombre:(comercios[me.refId]&&comercios[me.refId].nombre)||me.nombre,
    zona:pedidos[seleccion[0]].zona,cadete:cadete,fecha:fecha(),creado:Date.now(),
    pedidoIds:seleccion.slice(),conciliada:false};
  try{
    await put("planillas/"+plid,pl); planillas[plid]=pl;
    for(const id of seleccion){
      const d={estado:"despachado",planillaId:plid};
      await patch("pedidos/"+id,d); Object.assign(pedidos[id],d);
    }
    seleccion=[]; modo=""; cerrar(); render(); mostrarTique(plid);
  }catch(e){ cerrar(); mostrarError(e.message); }
}
function mostrarTique(plid){
  const pl=planillas[plid];
  const items=pl.pedidoIds.map(id=>pedidos[id]).filter(Boolean);
  let h='<div class="tique"><div class="c"><b>DELIVERY MAX</b><br>Comprobante de despacho<br>'+
    esc(pl.numero)+' · '+esc(pl.fecha)+'</div><div class="lin"></div>'+
    '<div>Comercio: <b>'+esc(pl.comercioNombre)+'</b></div>'+
    '<div>Zona: <b>'+esc(pl.zona)+'</b></div><div class="lin"></div>'+
    items.map(p=>'<div>• '+esc(p.destinatario)+' — '+esc(p.direccion)+'</div>').join("")+
    '<div class="lin"></div><div>Retira: <b>'+esc(pl.cadete)+'</b></div>'+
    '<div class="firma">Firma del cadete</div></div>';
  h+='<p class="hint noprint" style="margin-top:12px">Imprimí el tique, que lo firme el cadete y guardá tu copia hasta que vuelva a rendir.</p>';
  h+='<div class="noprint" style="display:flex;gap:8px">'+
     '<button class="btn gris" style="flex:1;padding:12px" onclick="window.print()">Imprimir</button>'+
     (!pl.conciliada&&esComercio()?'<button class="btn" style="flex:1;padding:12px" onclick="abrirConciliar(\''+plid+'\')">Cadete rindió</button>':'')+
     '</div>';
  sheet(h);
}
function abrirConciliar(plid){
  const pl=planillas[plid];
  const items=pl.pedidoIds.map(id=>[id,pedidos[id]]).filter(x=>x[1]);
  const faltan=items.filter(x=>x[1].estado!=="entregado");
  if(faltan.length){
    sheet('<h3>Todavía no se puede rendir</h3>'+
      '<p class="hint">El cadete aún no marcó como entregados estos pedidos:</p>'+
      faltan.map(x=>'<div class="meta">• '+esc(x[1].destinatario)+'</div>').join("")+
      '<p class="hint" style="margin-top:12px">Cuando el cadete los marque desde su panel, vas a poder cerrar la rendición.</p>'+
      '<button class="btn block gris" onclick="cerrar()">Entendido</button>');
    return;
  }
  const totalCobrado=items.reduce((a,x)=>a+(x[1].cobrar?Number(x[1].montoCobrar||0):0),0);
  const totalEnvios=items.reduce((a,x)=>a+Number(x[1].tarifaEnvio||0),0);
  sheet('<h3>Rendición de '+esc(pl.numero)+'</h3>'+
    '<p class="hint">Todos los pedidos figuran entregados. Cotejá con tu tique firmado y cerrá la rendición.</p>'+
    items.map(x=>'<div class="meta">✓ '+esc(x[1].destinatario)+
      (x[1].cobrar?' — cobró $'+(x[1].montoCobrar||0):'')+'</div>').join("")+
    '<div class="card" style="margin-top:12px;background:#f8fafc">'+
      '<div class="flex"><span class="meta">Dinero que rinde el cadete</span><b>$'+totalCobrado+'</b></div>'+
      '<div class="flex"><span class="meta">Envíos de esta planilla</span><b>$'+totalEnvios+'</b></div></div>'+
    '<button class="btn block" onclick="gConciliar(\''+plid+'\')">Confirmar rendición</button>');
}
async function gConciliar(plid){
  try{
    await patch("planillas/"+plid,{conciliada:true,conciliadaEn:Date.now()});
    planillas[plid].conciliada=true; cerrar(); render();
  }catch(e){ cerrar(); mostrarError(e.message); }
}

document.getElementById("p").addEventListener("keydown",e=>{if(e.key==="Enter")entrar()});
document.getElementById("u").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("p").focus()});
</script>
