<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Delivery Max</title>
<style>
  :root{--bg:#f1f5f9;--card:#fff;--tx:#0f172a;--mut:#64748b;--acc:#f0a828;--acc2:#b3730a;
        --line:rgba(0,0,0,.10);--ok:#15803d;--err:#dc2626}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--tx);
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .hide{display:none!important}

  #login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
  .box{width:100%;max-width:360px}
  .brand{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--acc2);margin-bottom:8px;text-align:center}
  h1{font-size:24px;margin:0 0 4px;text-align:center}
  .sub{font-size:13px;color:var(--mut);margin:0 0 26px;text-align:center}
  label{display:block;margin-bottom:14px}
  label span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:6px}
  input,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px;font-size:16px;
       background:#fff;color:var(--tx);outline:none;font-family:inherit}
  input:focus,select:focus{border-color:var(--acc)}
  .btn{background:var(--acc);color:#1a1d21;border:none;border-radius:10px;padding:9px 14px;
       font-size:12px;font-weight:700;cursor:pointer}
  .btn.block{width:100%;padding:13px;font-size:15px;margin-top:8px}
  #msg{font-size:13px;text-align:center;min-height:20px;margin-top:12px}

  header{background:var(--card);border-bottom:1px solid var(--line);padding:18px 20px 14px;
         display:flex;justify-content:space-between;align-items:flex-start}
  header h2{margin:0;font-size:19px}
  .who{font-size:12px;color:var(--mut);margin-top:2px}
  .iconbtn{background:none;border:none;color:var(--mut);font-size:13px;cursor:pointer;padding:6px}
  nav{display:flex;gap:6px;padding:14px 20px 8px;position:sticky;top:0;background:var(--bg);z-index:5}
  .tab{flex:1;padding:10px 4px;border-radius:12px;border:1px solid transparent;background:none;
       font-size:12px;font-weight:500;color:var(--mut);cursor:pointer}
  .tab.on{background:#fef3c7;color:var(--acc2);border-color:#fcd34d}
  main{padding:8px 20px 60px}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .count{font-size:12px;color:var(--mut)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px;
        margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .flex{display:flex;justify-content:space-between;align-items:center;gap:10px}
  .name{font-size:14px;font-weight:600}
  .meta{font-size:12px;color:var(--mut);margin-top:2px}
  .del{background:none;border:none;color:#cbd5e1;font-size:16px;cursor:pointer;padding:4px}
  .del:active{color:var(--err)}
  .tarifa{width:90px;background:none;border:none;text-align:right;font-size:14px;font-weight:700;
          color:var(--acc2);outline:none;padding:0}
  .tarifa:disabled{color:#94a3b8}
  .hint{font-size:11px;color:var(--mut);margin:0 0 12px}
  .pill{font-size:11px;font-weight:600;color:var(--acc2);background:none;border:none;padding:5px;cursor:pointer}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#e2e8f0;color:#475569}
  .tag.ok{background:#dcfce7;color:#15803d}

  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;
         justify-content:center;z-index:50}
  .sheet{background:var(--card);width:100%;max-width:440px;border-radius:18px 18px 0 0;
         padding:20px 20px 28px;max-height:88vh;overflow:auto}
  .sheet h3{margin:0 0 16px;font-size:15px}
  .err{background:#fee2e2;border:1px solid #fecaca;color:#991b1b;font-size:12px;
       padding:10px 14px;border-radius:10px;margin:12px 20px 0}
  .empty{text-align:center;color:var(--mut);font-size:13px;padding:36px 0}

  header,nav,main,#error{max-width:620px;margin-left:auto;margin-right:auto}
  @media(min-width:700px){
    header{margin-top:16px;border:1px solid var(--line);border-radius:14px}
    nav{position:static}
    #modal{align-items:center}
    .sheet{border-radius:16px}
  }
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="brand">Delivery Max</div>
    <h1>Ingresar</h1>
    <p class="sub">Usá el usuario y la clave que te dio la administración</p>
    <label><span>Usuario</span><input id="u" autocomplete="username" autocapitalize="none" placeholder="ej: diego"></label>
    <label><span>Clave</span><input id="p" type="password" autocomplete="current-password" placeholder="••••••••"></label>
    <button class="btn block" onclick="entrar()">Entrar</button>
    <div id="msg"></div>
  </div>
</div>

<div id="panel" class="hide">
  <header>
    <div>
      <div class="brand" style="text-align:left">Panel Max</div>
      <h2>Delivery Max</h2>
      <div class="who" id="who"></div>
    </div>
    <div style="white-space:nowrap">
      <button class="iconbtn" onclick="cargarTodo()">↻</button>
      <button class="iconbtn" onclick="salir()">Salir</button>
    </div>
  </header>
  <div id="error" class="err hide"></div>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="modal" class="hide"></div>

<script>
const API_KEY="AIzaSyA93I_0zQAYn9KpcUq-VUYFI3uHTsAHDMk";
const DB="https://max-delivery1-default-rtdb.firebaseio.com";
const DOMINIO="@deliverymax.app";

let tk=null, refresh=null, uid=null, me=null;
let zonas={}, comercios={}, cadetes={}, usuarios={};
let tab="comercios";

async function login(usuario,clave){
  const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({email:usuario+DOMINIO,password:clave,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw new Error(traducir(d.error&&d.error.message));
  tk=d.idToken; refresh=d.refreshToken; uid=d.localId;
}
async function crearCuenta(usuario,clave){
  const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${API_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({email:usuario+DOMINIO,password:clave,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw new Error(traducir(d.error&&d.error.message));
  return d.localId;
}
async function renovar(){
  if(!refresh) return false;
  const r=await fetch(`https://securetoken.googleapis.com/v1/token?key=${API_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},
     body:"grant_type=refresh_token&refresh_token="+refresh});
  if(!r.ok) return false;
  const d=await r.json(); tk=d.id_token; refresh=d.refresh_token; return true;
}
function traducir(c){
  const m={EMAIL_NOT_FOUND:"Usuario inexistente",INVALID_PASSWORD:"Clave incorrecta",
    INVALID_LOGIN_CREDENTIALS:"Usuario o clave incorrectos",EMAIL_EXISTS:"Ese usuario ya existe",
    WEAK_PASSWORD:"La clave debe tener al menos 6 caracteres",
    TOO_MANY_ATTEMPTS_TRY_LATER:"Demasiados intentos. Probá en unos minutos."};
  return m[c]||c||"Error de conexión";
}

async function api(p,method,body){
  method=method||"GET";
  const opt={method:method}; if(body!==undefined) opt.body=JSON.stringify(body);
  let r=await fetch(DB+"/"+p+".json?auth="+tk,opt);
  if(r.status===401){ if(await renovar()) r=await fetch(DB+"/"+p+".json?auth="+tk,opt); }
  if(!r.ok) throw new Error(r.status===401||r.status===403?"No tenés permiso para esta acción":"Error de conexión");
  return r.json();
}
const get=p=>api(p);
const put=(p,d)=>api(p,"PUT",d);
const patch=(p,d)=>api(p,"PATCH",d);
const quitar=p=>api(p,"DELETE");

async function entrar(){
  const u=document.getElementById("u").value.trim().toLowerCase();
  const c=document.getElementById("p").value;
  const msg=document.getElementById("msg");
  if(!u||!c){ msg.style.color="#dc2626"; msg.textContent="Completá usuario y clave"; return; }
  msg.style.color="#64748b"; msg.textContent="Verificando...";
  try{
    await login(u,c);
    me=await get("usuarios/"+uid);
    if(!me||!me.rol) throw new Error("Tu cuenta no tiene rol asignado. Avisale al Administrador.");
    document.getElementById("login").classList.add("hide");
    document.getElementById("panel").classList.remove("hide");
    document.getElementById("who").textContent=(me.nombre||u)+" · "+etiqueta(me.rol);
    document.getElementById("p").value=""; msg.textContent="";
    await cargarTodo();
  }catch(e){ msg.style.color="#dc2626"; msg.textContent=e.message; }
}
function salir(){
  tk=refresh=uid=me=null;
  document.getElementById("panel").classList.add("hide");
  document.getElementById("login").classList.remove("hide");
}
const ROLES={admin:"Administrador",supervisor:"Supervisor",operador:"Operador base",
             comercio:"Comercio",cadete:"Cadete"};
const etiqueta=r=>ROLES[r]||r;
const esAdmin=()=>me&&me.rol==="admin";
const esSup=()=>esAdmin()||(me&&me.rol==="supervisor");
const esStaff=()=>esSup()||(me&&me.rol==="operador");

function mostrarError(m){
  const e=document.getElementById("error");
  if(!m){e.classList.add("hide");return}
  e.textContent=m; e.classList.remove("hide");
}
async function cargarTodo(){
  mostrarError("");
  try{
    const tareas=[get("zonas"),get("comercios"),get("cadetes")];
    if(esSup()) tareas.push(get("usuarios"));
    const res=await Promise.all(tareas);
    zonas=res[0]||{}; comercios=res[1]||{}; cadetes=res[2]||{}; usuarios=res[3]||{};
    render();
  }catch(e){ mostrarError(e.message); }
}

const esc=s=>String(s==null?"":s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));
function render(){
  const tabs=[["comercios","Comercios"],["zonas","Zonas"],["cadetes","Cadetes"]];
  if(esSup()) tabs.push(["usuarios","Accesos"]);
  document.getElementById("nav").innerHTML=tabs.map(t=>
    '<button class="tab '+(tab===t[0]?"on":"")+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join("");
  const m=document.getElementById("main");
  m.innerHTML = tab==="comercios"?vComercios(): tab==="zonas"?vZonas():
                tab==="cadetes"?vCadetes(): vUsuarios();
}
function setTab(t){ tab=t; render(); }

function cuentaDe(tipo,id){
  const e=Object.entries(usuarios).find(x=>x[1].refId===id&&x[1].rol===tipo);
  return e?e[1].usuario:null;
}
function vComercios(){
  const e=Object.entries(comercios);
  let h='<div class="row"><span class="count">'+e.length+' comercios</span>'+
    (esStaff()?'<button class="btn" onclick="abrir(\'comercio\')">+ Nuevo</button>':'')+'</div>';
  if(!e.length) return h+'<div class="empty">Sin comercios todavía.</div>';
  return h+e.map(function(x){ const id=x[0],c=x[1],cta=cuentaDe("comercio",id);
    return '<div class="card"><div class="flex"><div>'+
      '<div class="name">'+esc(c.nombre)+'</div>'+
      '<div class="meta">'+esc(c.tipo)+' · '+esc(c.ubicacion)+'</div>'+
      '<div style="margin-top:6px">'+(cta?'<span class="tag ok">acceso: '+esc(cta)+'</span>':'<span class="tag">sin acceso</span>')+'</div>'+
      '</div><div style="text-align:right;white-space:nowrap">'+
      (esSup()&&!cta?'<button class="pill" onclick="abrirAcceso(\'comercio\',\''+id+'\',\''+esc(c.nombre)+'\')">Dar acceso</button>':'')+
      (esAdmin()?'<button class="del" onclick="borrar(\'comercios\',\''+id+'\')">🗑</button>':'')+
      '</div></div></div>'; }).join("");
}
function vZonas(){
  const e=Object.entries(zonas);
  let h='<div class="row"><span class="count">'+e.length+' zonas</span>'+
    (esSup()?'<button class="btn" onclick="abrir(\'zona\')">+ Nueva</button>':'')+'</div>'+
    (esAdmin()?'<p class="hint">Cambiá la tarifa y tocá afuera para guardar.</p>':'<p class="hint">Solo el Administrador modifica tarifas.</p>');
  return h+e.map(function(x){ const id=x[0],z=x[1];
    return '<div class="card"><div class="flex"><div class="name">'+esc(z.nombre)+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px"><span style="color:#94a3b8">$</span>'+
      '<input class="tarifa" type="number" value="'+z.tarifa+'" '+(esAdmin()?"":"disabled")+
      ' onchange="setTarifa(\''+id+'\',this.value)">'+
      (esAdmin()?'<button class="del" onclick="borrar(\'zonas\',\''+id+'\')">🗑</button>':'')+
      '</div></div></div>'; }).join("");
}
function vCadetes(){
  const e=Object.entries(cadetes);
  let h='<div class="row"><span class="count">'+e.length+' cadetes</span>'+
    (esStaff()?'<button class="btn" onclick="abrir(\'cadete\')">+ Nuevo</button>':'')+'</div>';
  if(!e.length) return h+'<div class="empty">Sin cadetes todavía.</div>';
  return h+e.map(function(x){ const id=x[0],c=x[1],cta=cuentaDe("cadete",id);
    return '<div class="card"><div class="flex"><div>'+
      '<div class="name">'+esc(c.nombre)+'</div>'+
      '<div class="meta" style="color:'+(c.estado==="en_ruta"?"#64748b":"#15803d")+'">● '+(c.estado==="en_ruta"?"En ruta":"Disponible")+'</div>'+
      '<div style="margin-top:6px">'+(cta?'<span class="tag ok">acceso: '+esc(cta)+'</span>':'<span class="tag">sin acceso</span>')+'</div>'+
      '</div><div style="text-align:right;white-space:nowrap">'+
      (esSup()&&!cta?'<button class="pill" onclick="abrirAcceso(\'cadete\',\''+id+'\',\''+esc(c.nombre)+'\')">Dar acceso</button>':'')+
      (esAdmin()?'<button class="del" onclick="borrar(\'cadetes\',\''+id+'\')">🗑</button>':'')+
      '</div></div></div>'; }).join("");
}
function vUsuarios(){
  const e=Object.entries(usuarios);
  let h='<div class="row"><span class="count">'+e.length+' accesos</span>'+
    (esAdmin()?'<button class="btn" onclick="abrir(\'staff\')">+ Operador</button>':'')+'</div>'+
    '<p class="hint">Cada persona entra con su usuario y clave propios. Las claves no se guardan en la base: las administra Firebase de forma cifrada.</p>';
  return h+e.map(function(x){ const u=x[0],d=x[1];
    return '<div class="card"><div class="flex"><div>'+
      '<div class="name">'+esc(d.nombre||d.usuario)+'</div>'+
      '<div class="meta">'+etiqueta(d.rol)+' · usuario: <b>'+esc(d.usuario||"—")+'</b></div></div>'+
      (esAdmin()&&u!==uid?'<button class="del" onclick="borrar(\'usuarios\',\''+u+'\')">🗑</button>':'')+
      '</div></div>'; }).join("");
}

async function setTarifa(id,v){
  try{ await patch("zonas/"+id,{tarifa:Number(v)}); zonas[id].tarifa=Number(v); mostrarError(""); }
  catch(e){ mostrarError(e.message); }
}
async function borrar(rama,id){
  if(!confirm("¿Borrar este registro?"))return;
  try{ await quitar(rama+"/"+id);
    if(rama==="comercios")delete comercios[id];
    if(rama==="zonas")delete zonas[id];
    if(rama==="cadetes")delete cadetes[id];
    if(rama==="usuarios")delete usuarios[id];
    render();
  }catch(e){ mostrarError(e.message); }
}

const cerrar=()=>document.getElementById("modal").classList.add("hide");
const val=id=>document.getElementById(id).value.trim();
function sheet(html){
  const m=document.getElementById("modal");
  m.innerHTML='<div class="sheet"><div style="text-align:right">'+
    '<button class="iconbtn" onclick="cerrar()">✕</button></div>'+html+'</div>';
  m.classList.remove("hide");
}
function abrir(t){
  const zs=Object.values(zonas).map(z=>'<option>'+esc(z.nombre)+'</option>').join("");
  if(t==="comercio") sheet('<h3>Nuevo comercio</h3>'+
    '<label><span>Nombre</span><input id="f1" placeholder="Ej: Supermercado El Sol"></label>'+
    '<label><span>Tipo</span><input id="f2" placeholder="Ej: Supermercado"></label>'+
    '<label><span>Zona</span><select id="f3">'+zs+'</select></label>'+
    '<button class="btn block" onclick="gComercio()">Guardar comercio</button>');
  if(t==="zona") sheet('<h3>Nueva zona</h3>'+
    '<label><span>Nombre</span><input id="f1" placeholder="Ej: Barrio Norte"></label>'+
    '<label><span>Tarifa ($)</span><input id="f2" type="number" value="1500"></label>'+
    '<button class="btn block" onclick="gZona()">Guardar zona</button>');
  if(t==="cadete") sheet('<h3>Nuevo cadete</h3>'+
    '<label><span>Nombre</span><input id="f1" placeholder="Ej: Juan Pérez"></label>'+
    '<button class="btn block" onclick="gCadete()">Guardar cadete</button>');
  if(t==="staff") sheet('<h3>Nuevo operador</h3>'+
    '<label><span>Nombre completo</span><input id="f1" placeholder="Ej: Laura Méndez"></label>'+
    '<label><span>Rango</span><select id="f2">'+
      '<option value="operador">Operador base</option>'+
      '<option value="supervisor">Supervisor</option>'+
      '<option value="admin">Administrador</option></select></label>'+
    '<label><span>Usuario (sin espacios)</span><input id="f3" autocapitalize="none" placeholder="ej: laura"></label>'+
    '<label><span>Clave (mínimo 6)</span><input id="f4" type="text" placeholder="clave inicial"></label>'+
    '<button class="btn block" onclick="gStaff()">Crear acceso</button>');
}
function abrirAcceso(tipo,id,nombre){
  sheet('<h3>Dar acceso a '+esc(nombre)+'</h3>'+
    '<p class="hint">Se crea una cuenta para que '+(tipo==="comercio"?"el comercio":"el cadete")+' entre a su propio panel.</p>'+
    '<label><span>Usuario (sin espacios)</span><input id="f1" autocapitalize="none" placeholder="ej: farmacialuna"></label>'+
    '<label><span>Clave (mínimo 6)</span><input id="f2" type="text" placeholder="clave inicial"></label>'+
    '<input type="hidden" id="ftipo" value="'+tipo+'"><input type="hidden" id="fid" value="'+id+'">'+
    '<input type="hidden" id="fnom" value="'+esc(nombre)+'">'+
    '<button class="btn block" onclick="gAcceso()">Crear acceso</button>');
}
async function gComercio(){
  const d={nombre:val("f1"),tipo:val("f2"),ubicacion:val("f3")};
  if(!d.nombre||!d.tipo)return alert("Completá nombre y tipo");
  const id="c"+Date.now();
  try{ await put("comercios/"+id,d); comercios[id]=d; cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
async function gZona(){
  const d={nombre:val("f1"),tarifa:Number(val("f2")),activa:true};
  if(!d.nombre)return alert("Completá el nombre");
  const id="z"+Date.now();
  try{ await put("zonas/"+id,d); zonas[id]=d; cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
async function gCadete(){
  const d={nombre:val("f1"),estado:"disponible"};
  if(!d.nombre)return alert("Completá el nombre");
  const id="cd"+Date.now();
  try{ await put("cadetes/"+id,d); cadetes[id]=d; cerrar(); render(); }
  catch(e){ cerrar(); mostrarError(e.message); }
}
async function gStaff(){
  const nom=val("f1"),rol=val("f2"),us=val("f3").toLowerCase().replace(/\s/g,""),cl=val("f4");
  if(!nom||!us||cl.length<6)return alert("Completá todo. La clave necesita 6 caracteres o más.");
  try{
    const nuevoUid=await crearCuenta(us,cl);
    const d={nombre:nom,rol:rol,usuario:us};
    await put("usuarios/"+nuevoUid,d); usuarios[nuevoUid]=d;
    cerrar(); render();
    alert("Acceso creado.\n\nUsuario: "+us+"\nClave: "+cl+"\n\nAnotalo y entregáselo a la persona.");
  }catch(e){ alert(e.message); }
}
async function gAcceso(){
  const tipo=val("ftipo"),id=val("fid"),nom=val("fnom");
  const us=val("f1").toLowerCase().replace(/\s/g,""),cl=val("f2");
  if(!us||cl.length<6)return alert("Completá usuario y clave (mínimo 6 caracteres)");
  try{
    const nuevoUid=await crearCuenta(us,cl);
    const d={nombre:nom,rol:tipo,usuario:us,refId:id};
    await put("usuarios/"+nuevoUid,d); usuarios[nuevoUid]=d;
    cerrar(); render();
    alert("Acceso creado para "+nom+".\n\nUsuario: "+us+"\nClave: "+cl+"\n\nAnotalo y entregáselo.");
  }catch(e){ alert(e.message); }
}

document.getElementById("p").addEventListener("keydown",e=>{ if(e.key==="Enter") entrar(); });
document.getElementById("u").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("p").focus(); });
</script>
</body>
</html>
